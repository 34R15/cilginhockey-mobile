<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Air Hockey Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Modular stylesheets — load order matters: tokens first (defines vars),
         then shared animations, then layout and components. -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/name-form.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/waiting-room.css">
    <link rel="stylesheet" href="css/settings-popup.css">
    <link rel="stylesheet" href="css/overlays.css">
</head>
<body>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/main.js"></script>

    <div id="nameForm">
        <div class="form-content">
            <h2>ÇILGIN HOKEY</h2>
            <input type="text" id="playerNameInput" class="field-input" placeholder="Takma Adınız" maxlength="10">
            <button id="submitNameBtn" class="btn btn-cta">Başla</button>
        </div>
    </div>

    <div id="menu" style="display: none;">
        <div id="mainMenu">
            <div class="brand">ÇILGIN HOKEY</div>
            <button id="quickPlayBtn" class="btn btn-cta">
                <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Hızlı Oyna
            </button>
            <button id="botPlayBtn" class="btn btn-accent btn-purple">
                <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="3"/><path d="M12 8V4"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/></svg>Tek Oyuncu (Bot)
            </button>
            <button id="createRoomBtn" class="btn btn-accent btn-cyan">
                <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>Oda Oluştur
            </button>
            <div class="menu-divider">veya</div>
            <div class="join-room">
                <input type="number" inputmode="numeric" pattern="[0-9]*" id="roomId" placeholder="Oda Kodu" class="field-input" style="text-align:center;letter-spacing:4px;">
                <button id="joinRoomBtn" class="btn btn-accent">Odaya Katıl</button>
            </div>
            <button id="backToNameBtn" class="btn btn-ghost">Geri Dön</button>
        </div>
        <div id="waitingRoom" style="display: none;">
            <div class="waiting-title">Oda Hazır</div>
            <div class="waiting-label">Oda Kodu</div>
            <div class="room-id-box" id="currentRoomId"></div>
            <div class="copy-row">
                <button class="copy-btn copy-code" id="copyRoomBtn">Kopyala</button>
                <button class="copy-btn share-btn" id="shareRoomBtn">Paylaş</button>
            </div>
            <div class="waiting-desc waiting-dots">Rakip bekleniyor</div>
        </div>
    </div>

    <!-- Score Limit Selection Popup -->
    <div id="scoreLimitPopup" class="popup">
        <div class="popup-content">
            <h2>Oyun Ayarları</h2>
            <div class="setting-group">
                <span class="seg-label">Kazanma Skoru</span>
                <div class="segment wrap" id="scoreSegment">
                    <button type="button" class="seg-option" data-value="3">3<span class="seg-sub">Hızlı</span></button>
                    <button type="button" class="seg-option active" data-value="5">5<span class="seg-sub">Normal</span></button>
                    <button type="button" class="seg-option" data-value="7">7<span class="seg-sub">Uzun</span></button>
                    <button type="button" class="seg-option" data-value="10">10<span class="seg-sub">Maraton</span></button>
                </div>
            </div>
            <div class="setting-group">
                <span class="seg-label">Saha Tipi</span>
                <div class="segment" id="courtSegment">
                    <button type="button" class="seg-option" data-value="half">Yarım<span class="seg-sub">Klasik</span></button>
                    <button type="button" class="seg-option active" data-value="full">Tam<span class="seg-sub">Serbest</span></button>
                </div>
            </div>
            <div class="setting-group" id="difficultyGroup" style="display:none;">
                <span class="seg-label">Bot Zorluğu</span>
                <div class="segment" id="difficultySegment">
                    <button type="button" class="seg-option" data-value="easy">Kolay</button>
                    <button type="button" class="seg-option active" data-value="medium">Orta</button>
                    <button type="button" class="seg-option" data-value="hard">Zor</button>
                </div>
            </div>
            <button id="confirmScoreLimit" class="btn btn-cta">Oyunu Başlat</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="rotateMessage">Lütfen telefonunuzu dikey konuma çevirin!</div>

    <div id="startCountdown" style="display:none;"></div>

    <div id="toast" class="toast-notification">Oda kodu kopyalandı!</div>

    <div id="goalAnimation" class="goal-animation" style="display:none;">GOOOL!</div>
</body>
</html>
